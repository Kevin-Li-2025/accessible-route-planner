  Routing__RouteGraphFileArtifactManifestFileName: "manifest.json"
  Routing__RouteGraphMaxFileArtifactShardLoadCount: "64"
  Routing__RouteGraphFileArtifactWarmupEnabled: "false"
  Routing__RouteGraphFileArtifactWarmupDelaySeconds: "5"
  Routing__RouteGraphFileArtifactWarmupShardLimit: "64"
  Routing__RouteGraphFileArtifactWarmupLargestShardsFirst: "true"
  Routing__RouteGraphFileArtifactReadinessValidationShardLimit: "8"
  Routing__RouteGraphOfflineShardArtifactBuildEnabled: "false"
  Routing__RouteGraphOfflineShardArtifactBuildLimit: "0"
  Routing__RouteGraphAltPreprocessingEnabled: "true"
  Routing__RouteGraphAltLandmarkCount: "4"
  Routing__RouteGraphMaxAltPreprocessedNodes: "50000"
  Routing__RouteGraphContractionHierarchyEnabled: "false"
  Routing__RouteGraphMaxContractionHierarchyNodes: "25000"
  Routing__RouteGraphReleaseBuildAndExit: "false"
  Routing__RouteGraphReleaseValidateAndExit: "false"
  Routing__RouteGraphReleasePaddingDegrees: "0.01"
  Routing__RouteGraphReleaseShardSizeDegrees: "0"
  Routing__RouteGraphReleaseSourceName: "release-pipeline"
  Routing__RouteGraphProfileAndExit: "false"
  Routing__RouteGraphProfileUseOsmExtract: "true"
  Routing__RouteGraphProfileOutputPath: ""
  Routing__RouteGraphProfileFailOnQualityGate: "false"
  Routing__RouteGraphProfileMaxRedisPayloadBytes: "8388608"
  Routing__RouteGraphProfileMaxArtifactBytes: "33554432"
  Routing__RouteGraphProfileMaxColdLoadMilliseconds: "2000"
  Routing__RouteGraphProfileMaxHotLoadMilliseconds: "100"
  Routing__RouteGraphProfileMaxArtifactPackMilliseconds: "750"
  Routing__RouteGraphProfileMaxArtifactStoreReadMilliseconds: "150"
  Routing__RouteGraphProfileMaxArtifactUnpackMilliseconds: "150"
  Routing__RouteGraphProfileMaxShardReferencesPerRoute: "64"
  Routing__RouteGraphDistributedLoadCoalescingEnabled: "true"
  Routing__RouteGraphDistributedLoadLockTtlSeconds: "8"
  Routing__RouteGraphDistributedLoadWaitMilliseconds: "3500"
  Routing__DistributedCoalescingEnabled: "true"
  Routing__DistributedCoalescingLockTtlSeconds: "6"
  Routing__DistributedCoalescingResultTtlSeconds: "10"
  Routing__DistributedCoalescingWaitMilliseconds: "3500"
  Routing__DistributedCoalescingPollMilliseconds: "25"
  RiskScoring__CacheTtlSeconds: "30"
  RiskScoring__CacheCoordinatePrecision: "4"
  RiskScoring__CacheRadiusBucketMetres: "50"
  RiskScoring__CacheFillTimeoutSeconds: "5"
  RiskScoring__ExternalSignalBudgetMilliseconds: "350"
  RiskScoring__RealtimeExternalSignalsEnabled: "false"
  HotPathWarmup__Enabled: "true"
  HotPathWarmup__InitialDelaySeconds: "2"
