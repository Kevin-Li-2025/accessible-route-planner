  HotPathWarmup__TimeoutSeconds: "20"
  HotPathWarmup__MaxPoints: "192"
  HotPathWarmup__BucketCorridorRadiusSteps: "20"
  HotPathWarmup__BucketCorridorStepDegrees: "0.0001"
  HotPathWarmup__RiskRadiusMetres: "500"
  HotPathWarmup__PoiRadiusMetres: "750"
  HotPathWarmup__WarmHazards: "true"
  HotPathWarmup__WarmRouteGraph: "false"
  HotPathWarmup__Points__0__Name: "birmingham-core"
  HotPathWarmup__Points__0__Lat: "52.4862"
  HotPathWarmup__Points__0__Lng: "-1.8904"
  HotPathWarmup__Points__1__Name: "birmingham-east"
  HotPathWarmup__Points__1__Lat: "52.4835"
  HotPathWarmup__Points__1__Lng: "-1.8885"
  AiEnrichment__Enabled: "true"
  AiEnrichment__Provider: "local-vision"
  AiEnrichment__DuplicateRadiusMetres: "25"
  AiEnrichment__MinimumCandidateConfidence: "0.35"
  AiEnrichment__AllowRouteDecisionInfluence: "false"
  AiEnrichment__MaxExplanationWarnings: "5"
  AiEnrichment__OpenAiEndpoint: "https://api.openai.com/v1/responses"
  AiEnrichment__OpenAiModel: "gpt-5-mini"
  AiEnrichment__OpenAiTimeoutSeconds: "8"
  AiEnrichment__OpenAiMaxOutputTokens: "900"
  AiEnrichment__NebiusBaseUrl: "https://api.tokenfactory.nebius.com/v1"
  AiEnrichment__NebiusModel: "openai/gpt-oss-120b-fast"
  AiEnrichment__NebiusHighQualityModel: "Qwen/Qwen3.5-397B-A17B-fast"
  AiEnrichment__NebiusTimeoutSeconds: "8"
  AiEnrichment__NebiusMaxTokens: "700"
  AiEnrichment__NebiusEnableImageInputs: "false"
  AiEnrichment__VisionModelEndpoint: "http://accesscity-vision:8095"
  AiEnrichment__VisionModelTimeoutSeconds: "3"
  AiEnrichment__VisionModelMinimumConfidence: "0.35"
  Geocoding__UpstreamAttempts: "1"
  Geocoding__RetryDelayMilliseconds: "100"
  HealthChecks__ReadinessCacheMilliseconds: "2000"
  HealthChecks__ReadinessBackgroundRefreshMilliseconds: "2000"
  ExternalApis__CircuitBreaker__FailureThreshold: "3"
  ExternalApis__CircuitBreaker__BreakSeconds: "30"
  ExternalApis__CircuitBreaker__QueueTimeoutMilliseconds: "50"
  ExternalApis__Osrm__TimeoutSeconds: "3"
  ExternalApis__Osrm__MaxConcurrentRequests: "32"
  ExternalApis__Overpass__TimeoutSeconds: "5"
  ExternalApis__Overpass__MaxConcurrentRequests: "4"
  ExternalApis__Overpass__RealtimeHazardsEnabled: "false"
  ExternalApis__Overpass__HazardFetchBudgetSeconds: "5"
  ExternalApis__UkPolice__TimeoutSeconds: "2"
  ExternalApis__UkPolice__MaxConcurrentRequests: "8"
  ExternalApis__Nominatim__TimeoutSeconds: "2"
  ExternalApis__Environmental__TimeoutSeconds: "3"
  ExternalApis__Environmental__MaxConcurrentRequests: "4"
  RateLimiting__Global__PermitLimit: "30000"
  RateLimiting__Global__WindowSeconds: "60"
  RateLimiting__Global__SegmentsPerWindow: "4"
  RateLimiting__Global__QueueLimit: "0"
  RateLimiting__Auth__PermitLimit: "60"
  RateLimiting__Auth__WindowSeconds: "60"
  RateLimiting__Auth__QueueLimit: "0"
  RateLimiting__RoutingHeavy__PermitLimit: "240"
  RateLimiting__RoutingHeavy__WindowSeconds: "60"
  RateLimiting__RoutingHeavy__QueueLimit: "0"
  RateLimiting__RoutingPoll__PermitLimit: "1800"
  RateLimiting__RoutingPoll__WindowSeconds: "60"
  RateLimiting__RoutingPoll__QueueLimit: "0"
  RateLimiting__HotRead__PermitLimit: "2400"
  RateLimiting__HotRead__WindowSeconds: "60"
  RateLimiting__HotRead__QueueLimit: "0"
  RateLimiting__Tile__PermitLimit: "6000"
  RateLimiting__Tile__WindowSeconds: "60"
  RateLimiting__Tile__QueueLimit: "0"
  RateLimiting__Write__PermitLimit: "120"
  RateLimiting__Write__WindowSeconds: "60"
  RateLimiting__Write__QueueLimit: "0"
  RateLimiting__Upload__PermitLimit: "20"
  RateLimiting__Upload__WindowSeconds: "60"
  RateLimiting__Upload__QueueLimit: "0"
  RateLimiting__AiAssist__PermitLimit: "30"
  RateLimiting__AiAssist__WindowSeconds: "60"
  RateLimiting__AiAssist__QueueLimit: "0"
  RequestProtection__DefaultTimeoutSeconds: "15"
  RequestProtection__ShortReadTimeoutSeconds: "5"
  RequestProtection__RouteSyncTimeoutSeconds: "6"
  RequestProtection__RouteAsyncSubmitTimeoutSeconds: "3"
  RequestProtection__AiAssistTimeoutSeconds: "10"
  RequestProtection__UploadTimeoutSeconds: "15"
  RequestProtection__MaxRequestBodyBytes: "10485760"
  RequestProtection__RequestHeadersTimeoutSeconds: "10"
  RequestProtection__KeepAliveTimeoutSeconds: "65"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
