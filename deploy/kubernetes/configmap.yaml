  Routing__MaxRiskQueryRadiusMetres: "2500"
  Routing__MaxRouteGraphEdges: "20000"
  Routing__RouteGraphMaxSnapDistanceMetres: "150"
  Routing__AsyncFirstForCacheMiss: "true"
  Routing__AsyncFirstCacheProbeMilliseconds: "0"
  Routing__DispatchJobsToWorker: "true"
  Routing__RouteJobDispatchConcurrency: "4"
  Routing__RouteGraphWarmupEnabled: "false"
  Routing__RouteGraphCacheTtlSeconds: "300"
  Routing__RouteGraphShardSizeDegrees: "0.01"
  Routing__RouteGraphPrepartitionedShardsEnabled: "true"
  Routing__RouteGraphMaxPrepartitionedShardCount: "64"
  Routing__RouteGraphMinEdgesPerPrepartitionedShard: "250"
  Routing__RouteGraphPackedArtifactsEnabled: "true"
  Routing__RouteGraphMaxDistributedSnapshotBytes: "8388608"
  Routing__RouteGraphFileArtifactStoreEnabled: "false"
  Routing__RouteGraphFileArtifactDirectory: "/app/route-graph-artifacts"
