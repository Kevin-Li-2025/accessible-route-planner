apiVersion: v1
kind: ConfigMap
metadata:
  name: accesscity-api-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Messaging__UseKafka: "true"
  Kafka__BootstrapServers: "kafka:9092"
  Kafka__ConsumerGroupId: "accesscity-workers"
  Kafka__TopicPrefix: "accesscity_"
  Kafka__TopicPartitions: "12"
  Kafka__MaxProcessingAttempts: "3"
  Kafka__RetryDelaySeconds: "5"
  Workers__OsmImport__Enabled: "false"
  Workers__Routing__Enabled: "false"
  Workers__TileWarming__Enabled: "false"
  OsmImport__ImportOnStartup: "false"
  Postgres__AutoMigrate: "false"
  Postgres__AutoSchemaMaintenance: "false"
  Postgres__UseDirectDatabaseUrl: "false"
  Postgres__CommandTimeoutSeconds: "30"
  Postgres__UseStartupSessionParameters: "false"
  Postgres__StatementTimeoutMs: "15000"
  Postgres__IdleInTransactionSessionTimeoutMs: "30000"
  Postgres__MaxPoolSize: "20"
  Postgres__DbContextPoolSize: "128"
  Routing__MaxConcurrentComputations: "4"
  Routing__SyncSafePathTimeoutSeconds: "4"
  Routing__ComputationQueueTimeoutSeconds: "2"
  Routing__JobComputationQueueTimeoutSeconds: "30"
  Routing__HazardQueryPaddingMetres: "250"
  Routing__MaxHazardsPerRequest: "500"
  Routing__MaxRiskQueryRadiusMetres: "2500"
  Routing__MaxRouteGraphEdges: "20000"
  Routing__AsyncFirstForCacheMiss: "true"
  Routing__DispatchJobsToWorker: "true"
  Routing__RouteGraphCacheTtlSeconds: "300"
  Routing__RouteGraphShardSizeDegrees: "0.01"
  RiskScoring__CacheTtlSeconds: "30"
  RiskScoring__CacheCoordinatePrecision: "4"
  RiskScoring__CacheRadiusBucketMetres: "50"
  RiskScoring__ExternalSignalBudgetMilliseconds: "350"
  RiskScoring__RealtimeExternalSignalsEnabled: "false"
  AiEnrichment__Enabled: "true"
  AiEnrichment__Provider: "local-rules"
  AiEnrichment__DuplicateRadiusMetres: "25"
  AiEnrichment__MinimumCandidateConfidence: "0.35"
  AiEnrichment__AllowRouteDecisionInfluence: "false"
  AiEnrichment__MaxExplanationWarnings: "5"
  Geocoding__UpstreamAttempts: "1"
  Geocoding__RetryDelayMilliseconds: "100"
  HealthChecks__ReadinessCacheMilliseconds: "2000"
  ExternalApis__CircuitBreaker__FailureThreshold: "3"
  ExternalApis__CircuitBreaker__BreakSeconds: "30"
  ExternalApis__CircuitBreaker__QueueTimeoutMilliseconds: "50"
  ExternalApis__Osrm__TimeoutSeconds: "3"
  ExternalApis__Osrm__MaxConcurrentRequests: "32"
  ExternalApis__Overpass__TimeoutSeconds: "5"
  ExternalApis__Overpass__MaxConcurrentRequests: "4"
  ExternalApis__Overpass__RealtimeHazardsEnabled: "false"
  ExternalApis__Overpass__HazardFetchBudgetSeconds: "5"
  ExternalApis__UkPolice__TimeoutSeconds: "2"
  ExternalApis__UkPolice__MaxConcurrentRequests: "8"
  ExternalApis__Nominatim__TimeoutSeconds: "2"
  ExternalApis__Environmental__TimeoutSeconds: "3"
  ExternalApis__Environmental__MaxConcurrentRequests: "4"
  RateLimiting__Global__PermitLimit: "30000"
  RateLimiting__Global__QueueLimit: "0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
---
