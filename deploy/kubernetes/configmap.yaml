apiVersion: v1
kind: ConfigMap
metadata:
  name: accesscity-api-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Messaging__UseKafka: "true"
  Kafka__BootstrapServers: "kafka:9092"
