apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: accesscity-vision-models
  labels:
    app: accesscity-vision
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accesscity-vision
  labels:
    app: accesscity-vision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accesscity-vision
  template:
    metadata:
      labels:
        app: accesscity-vision
    spec:
      containers:
        - name: vision
          image: ghcr.io/kevin-li-2025/codeconquerors-accessibility-vision:latest
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /app/serve_accessibility_vision.py
          args:
            - --checkpoint
            - $(VISION_MODEL_CHECKPOINT)
            - --host
            - "0.0.0.0"
            - --port
            - "8095"
            - --device
            - auto
            - --max-batch-images
            - $(VISION_MAX_BATCH_IMAGES)
            - --max-batch-wait-ms
            - $(VISION_MAX_BATCH_WAIT_MS)
          env:
            - name: VISION_MODEL_CHECKPOINT
              value: /models/accesscity-vision/best.pt
            - name: VISION_MAX_BATCH_IMAGES
              value: "32"
            - name: VISION_MAX_BATCH_WAIT_MS
              value: "1"
            - name: VISION_REQUIRE_HOLDOUT_METRICS
              value: "true"
            - name: VISION_REQUIRE_TEMPERATURE_SCALING
              value: "true"
            - name: VISION_MIN_HOLDOUT_MACRO_F1
              value: "0.70"
            - name: VISION_MAX_HOLDOUT_MACRO_ECE
              value: "0.12"
            - name: VISION_MIN_CALIBRATION_MACRO_F1
              value: "0.70"
            - name: VISION_MAX_CALIBRATION_MACRO_ECE
              value: "0.12"
          ports:
            - containerPort: 8095
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-artifacts
              mountPath: /models/accesscity-vision
              readOnly: true
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: accesscity-vision-models
---
apiVersion: v1
kind: Service
metadata:
  name: accesscity-vision
  labels:
    app: accesscity-vision
spec:
  selector:
    app: accesscity-vision
  ports:
    - name: http
      port: 8095
      targetPort: http
