apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: accesscity-api
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: accesscity-api
                port:
                  name: http
