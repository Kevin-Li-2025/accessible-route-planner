apiVersion: batch/v1
kind: Job
metadata:
  name: accesscity-distributed-loadtest
  labels:
    app: accesscity-loadtest
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: accesscity-loadtest
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.51.0
          imagePullPolicy: IfNotPresent
          command: ["k6", "run", "/scripts/accesscity-distributed.js"]
          env:
            - name: BASE_URL
              value: http://accesscity-api
            - name: TEST_DURATION
              value: 10m
            - name: ROUTE_RATE
              value: "80"
            - name: RISK_RATE
              value: "180"
            - name: POI_RATE
              value: "60"
            - name: READINESS_RATE
              value: "40"
            - name: ROUTE_POLL_TIMEOUT_SECONDS
              value: "20"
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "3"
              memory: "1Gi"
          volumeMounts:
            - name: loadtest-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: loadtest-script
          configMap:
            name: accesscity-loadtest-script
