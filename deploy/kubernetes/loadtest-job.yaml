apiVersion: batch/v1
kind: Job
metadata:
  name: accesscity-distributed-loadtest
  labels:
    app: accesscity-loadtest
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: accesscity-loadtest
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.51.0
          imagePullPolicy: IfNotPresent
          command: ["k6", "run", "/scripts/accesscity-distributed.js"]
          env:
            - name: BASE_URL
              value: http://accesscity-api
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: loadtest-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: loadtest-script
          configMap:
            name: accesscity-loadtest-script
