apiVersion: v1
kind: Secret
metadata:
  name: accesscity-api-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://accesscity:change-me@postgres:5432/accesscitydb?sslmode=require"
  ConnectionStrings__Redis: "redis:6379"
  Jwt__Key: "replace-with-64-plus-byte-production-signing-key"
  Jwt__PreviousKeys: ""
  Jwt__Issuer: "AccessCity.API"
  Jwt__Audience: "AccessCity.App"
  Cors__AllowedOrigins__0: "https://app.example.com"
  OpenWeather__ApiKey: ""
  GooglePlaces__ApiKey: ""
