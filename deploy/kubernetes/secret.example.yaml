apiVersion: v1
kind: Secret
metadata:
  name: accesscity-api-secrets
type: Opaque
stringData:
  # Runtime API/worker traffic should use a pooler such as the CNPG Pooler example.
  DATABASE_URL: "postgresql://accesscity:change-me@accesscity-postgres-rw-pooler:5432/accesscitydb?sslmode=disable"
  # Migration jobs use the direct primary service for DDL/schema maintenance.
  DIRECT_DATABASE_URL: "postgresql://accesscity:change-me@accesscity-postgres-rw:5432/accesscitydb?sslmode=require"
  ConnectionStrings__Redis: "redis:6379"
  Jwt__Key: "replace-with-64-plus-byte-production-signing-key"
  Jwt__PreviousKeys: ""
  Jwt__Issuer: "AccessCity.API"
  Jwt__Audience: "AccessCity.App"
  Cors__AllowedOrigins__0: "https://app.example.com"
  OpenWeather__ApiKey: ""
  GooglePlaces__ApiKey: ""
