apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: accesscity-api-pdb
  labels:
    app: accesscity-api
spec:
  minAvailable: "80%"
  selector:
    matchLabels:
      app: accesscity-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: accesscity-worker-pdb
  labels:
    app: accesscity-worker
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: accesscity-worker
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: accesscity-vision-pdb
  labels:
    app: accesscity-vision
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: accesscity-vision
