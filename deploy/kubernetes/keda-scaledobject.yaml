apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: accesscity-api-scalability
spec:
  scaleTargetRef:
    name: accesscity-api
  minReplicaCount: 6
  maxReplicaCount: 40
  fallback:
    failureThreshold: 3
    replicas: 6
  pollingInterval: 15
  cooldownPeriod: 300
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 4
              periodSeconds: 60
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 25
              periodSeconds: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: accesscity_safe_path_p95_ms
        threshold: "1500"
        query: |
          histogram_quantile(
            0.95,
            sum(rate(accesscity_route_safe_path_duration_milliseconds_bucket{http_route=~".*safe-path.*"}[2m])) by (le)
          )
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: accesscity_route_capacity_saturation_rate
        threshold: "0.5"
        query: |
          sum(rate(accesscity_route_computation_saturated_total[2m]))
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: accesscity_api_cpu_request_utilization
        threshold: "70"
        query: |
          100 *
          sum(rate(container_cpu_usage_seconds_total{namespace="accesscity",pod=~"accesscity-api-.*",container="api"}[2m]))
          /
          sum(kube_pod_container_resource_requests{namespace="accesscity",pod=~"accesscity-api-.*",container="api",resource="cpu"})
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: accesscity_api_memory_limit_utilization
        threshold: "75"
        query: |
          100 *
          sum(container_memory_working_set_bytes{namespace="accesscity",pod=~"accesscity-api-.*",container="api"})
          /
          sum(kube_pod_container_resource_limits{namespace="accesscity",pod=~"accesscity-api-.*",container="api",resource="memory"})
    - type: cron
      metadata:
        timezone: Europe/London
        start: "0 7 * * 1-5"
        end: "0 10 * * 1-5"
        desiredReplicas: "10"
    - type: cron
      metadata:
        timezone: Europe/London
        start: "0 16 * * 1-5"
        end: "0 19 * * 1-5"
        desiredReplicas: "10"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: accesscity-worker-kafka
spec:
  scaleTargetRef:
    name: accesscity-worker
  minReplicaCount: 6
  maxReplicaCount: 100
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: accesscity-workers
        topic: accesscity_routejobrequestedevent
        lagThreshold: "4"
        activationLagThreshold: "2"
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: accesscity-workers
        topic: accesscity_osmimportstartedevent
        lagThreshold: "2"
        activationLagThreshold: "1"
