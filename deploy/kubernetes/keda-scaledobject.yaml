apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: accesscity-worker-kafka
spec:
  scaleTargetRef:
    name: accesscity-worker
  minReplicaCount: 1
  maxReplicaCount: 8
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: accesscity-workers
        topic: accesscity_osmimportstartedevent
        lagThreshold: "5"
