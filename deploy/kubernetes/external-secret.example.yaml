apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: accesscity-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: production-secret-store
    kind: ClusterSecretStore
  target:
    name: accesscity-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: accesscity/production/database-url
    - secretKey: ConnectionStrings__Redis
      remoteRef:
        key: accesscity/production/redis-connection
    - secretKey: Jwt__Key
      remoteRef:
        key: accesscity/production/jwt-current-key
    - secretKey: Jwt__PreviousKeys
      remoteRef:
        key: accesscity/production/jwt-previous-keys
    - secretKey: OpenWeather__ApiKey
      remoteRef:
        key: accesscity/production/openweather-api-key
    - secretKey: GooglePlaces__ApiKey
      remoteRef:
        key: accesscity/production/google-places-api-key
