apiVersion: apps/v1
kind: Deployment
metadata:
  name: accesscity-worker
  labels:
    app: accesscity-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: accesscity-worker
  template:
    metadata:
      labels:
        app: accesscity-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/kevin-li-2025/codeconquerors-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: accesscity-worker-config
            - secretRef:
                name: accesscity-api-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            timeoutSeconds: 3
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            timeoutSeconds: 3
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "3"
              memory: "3Gi"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: accesscity-worker
