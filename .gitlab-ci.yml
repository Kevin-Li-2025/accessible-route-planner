# AccessCity — pre-release style checks + automated tests (GitLab CI)
#
# quality (gates before heavier jobs):
#   - Frontend static analysis: ESLint (expo lint)
#   - Supply chain: npm audit (high+), NuGet vulnerable packages
#   - TypeScript: tsc --noEmit (must pass)
# test:
#   - Backend: xUnit + WebApplicationFactory, PostGIS + Redis
#   - Frontend: Jest (jest-expo)
#   - E2E: Playwright + Expo web (Chromium; image matches package-lock @playwright/test)
#
# Not in CI (run locally or add templates): formal pen-test, accessibility audit tools,
# dedicated load harness outside xUnit, secret scanning (often GitLab project feature).

stages:
  - quality
  - test

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_XMLDOC_MODE: skip
  POSTGRES_DB: accesscitydb
  POSTGRES_USER: accesscity
  POSTGRES_PASSWORD: accesscity123
  DATABASE_URL: "postgresql://accesscity:accesscity123@postgres:5432/accesscitydb?sslmode=disable"
  ConnectionStrings__Redis: "redis:6379"
  Jwt__Key: "AccessCity_CI_Test_Jwt_Key_2026_Change_For_Production_At_Deploy_Time_64_Bytes"
  # npm audit needs the official advisories API (many mirrors do not implement it).
  NPM_CONFIG_REGISTRY: "https://registry.npmjs.org/"

default:
  interruptible: true

# ─── Quality: static analysis & dependency risk ─────────────────────────────
quality:frontend-lint:
  stage: quality
  image: node:20-bookworm
  timeout: 15m
  cache:
    key:
      files:
        - AccessCity.App/package-lock.json
    paths:
      - AccessCity.App/node_modules/
  script:
    - cd AccessCity.App
    - npm ci
    - npm run lint
  rules:
    - exists:
        - AccessCity.App/package.json

quality:frontend-typecheck:
  stage: quality
  image: node:20-bookworm
  timeout: 15m
  cache:
    key:
      files:
        - AccessCity.App/package-lock.json
    paths:
      - AccessCity.App/node_modules/
  script:
    - cd AccessCity.App
    - npm ci
    - npx tsc -p tsconfig.json --noEmit
  rules:
    - exists:
        - AccessCity.App/package.json

quality:security-npm:
  stage: quality
  image: node:20-bookworm
  timeout: 15m
  cache:
    key:
      files:
        - AccessCity.App/package-lock.json
    paths:
        - AccessCity.App/node_modules/
  script:
    - cd AccessCity.App
    - npm ci
    - npm audit --audit-level=high
  rules:
    - exists:
        - AccessCity.App/package.json

quality:security-dotnet:
  stage: quality
  image: mcr.microsoft.com/dotnet/sdk:9.0
  timeout: 15m
  script:
    - dotnet restore CodeConquerors.sln
    - dotnet list CodeConquerors.sln package --vulnerable --include-transitive | tee /tmp/dotnet-vulnerable.txt
    - '! grep -q "has the following vulnerable packages" /tmp/dotnet-vulnerable.txt'
  rules:
    - exists:
        - CodeConquerors.sln

# ─── Backend (xUnit + WebApplicationFactory; real Postgres + Redis) ─────────
backend:test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  services:
    - name: postgis/postgis:16-3.4
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  timeout: 45m
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends netcat-openbsd
    - |
      echo "Waiting for PostgreSQL (postgis)..."
      for i in $(seq 1 90); do
        if nc -z postgres 5432 2>/dev/null; then echo "Postgres port open."; break; fi
        sleep 2
      done
      nc -z postgres 5432 || { echo "PostgreSQL not reachable"; exit 1; }
    - |
      echo "Waiting for Redis..."
      for i in $(seq 1 30); do
        if nc -z redis 6379 2>/dev/null; then echo "Redis port open."; break; fi
        sleep 1
      done
      nc -z redis 6379 || { echo "Redis not reachable"; exit 1; }
  script:
    - dotnet --info
    - dotnet restore CodeConquerors.sln
    - dotnet build CodeConquerors.sln --configuration Release --no-restore
    - dotnet test AccessCity.Tests/AccessCity.Tests.csproj
        --configuration Release --no-build --verbosity normal
        --collect:"XPlat Code Coverage"
        --results-directory TestResults
        -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
  artifacts:
    when: always
    paths:
      - TestResults/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: TestResults/**/coverage.cobertura.xml
  rules:
    - exists:
        - CodeConquerors.sln

quality:route-benchmark:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  services:
    - name: postgis/postgis:16-3.4
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  timeout: 15m
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends netcat-openbsd
    - |
      echo "Waiting for PostgreSQL (postgis)..."
      for i in $(seq 1 90); do
        if nc -z postgres 5432 2>/dev/null; then echo "Postgres port open."; break; fi
        sleep 2
      done
      nc -z postgres 5432 || { echo "PostgreSQL not reachable"; exit 1; }
    - |
      echo "Waiting for Redis..."
      for i in $(seq 1 30); do
        if nc -z redis 6379 2>/dev/null; then echo "Redis port open."; break; fi
        sleep 1
      done
      nc -z redis 6379 || { echo "Redis not reachable"; exit 1; }
  script:
    - dotnet restore CodeConquerors.sln
    - dotnet build CodeConquerors.sln --configuration Release --no-restore
    - dotnet test AccessCity.Tests/AccessCity.Tests.csproj --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~RouteQualityBenchmark"
  rules:
    - exists:
        - CodeConquerors.sln

# ─── API smoke: live process + scripts/probe_api_endpoints.py ───────────────
# Uses AccessCity.Tests/Fixtures/test-network.osm (no repo-root *.osm required).
# Depends on outbound HTTPS (Nominatim, OSRM, etc.); failures there are environmental.
api:probe:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  services:
    - name: postgis/postgis:16-3.4
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  timeout: 45m
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends python3 netcat-openbsd curl
    - |
      echo "Waiting for PostgreSQL..."
      for i in $(seq 1 90); do
        if nc -z postgres 5432 2>/dev/null; then echo "Postgres port open."; break; fi
        sleep 2
      done
      nc -z postgres 5432 || { echo "PostgreSQL not reachable"; exit 1; }
    - |
      echo "Waiting for Redis..."
      for i in $(seq 1 30); do
        if nc -z redis 6379 2>/dev/null; then echo "Redis port open."; break; fi
        sleep 1
      done
      nc -z redis 6379 || { echo "Redis not reachable"; exit 1; }
  script:
    - dotnet restore CodeConquerors.sln
    - dotnet build AccessCity.API/AccessCity.API.csproj -c Release --no-restore
    - cp AccessCity.Tests/Fixtures/test-network.osm /tmp/accesscity-probe.osm
    - |
      export OsmImport__FilePath=/tmp/accesscity-probe.osm
      export OsmImport__ImportOnStartup=false
      export OsmImport__ReplaceExisting=true
      export ASPNETCORE_URLS=http://0.0.0.0:8080
      dotnet run --project AccessCity.API/AccessCity.API.csproj -c Release --no-build --no-launch-profile &
      echo $! > /tmp/accesscity-api.pid
    - |
      echo "Waiting for API /health/ready..."
      ok=0
      for i in $(seq 1 60); do
        if curl -sf http://127.0.0.1:8080/health/ready >/dev/null; then ok=1; break; fi
        sleep 2
      done
      if [ "$ok" != "1" ]; then
        echo "API did not become ready in time"
        kill $(cat /tmp/accesscity-api.pid) 2>/dev/null || true
        exit 1
      fi
    - python3 scripts/probe_api_endpoints.py http://127.0.0.1:8080
    - kill $(cat /tmp/accesscity-api.pid) 2>/dev/null || true
  rules:
    - exists:
        - scripts/probe_api_endpoints.py

# Same as api:probe but forces in-process cache (no Redis). Overrides global ConnectionStrings__Redis.
api:probe:noredis:
  extends: api:probe
  variables:
    ConnectionStrings__Redis: ""
  services:
    - name: postgis/postgis:16-3.4
      alias: postgres
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends python3 netcat-openbsd curl
    - |
      echo "Waiting for PostgreSQL..."
      for i in $(seq 1 90); do
        if nc -z postgres 5432 2>/dev/null; then echo "Postgres port open."; break; fi
        sleep 2
      done
      nc -z postgres 5432 || { echo "PostgreSQL not reachable"; exit 1; }

# ─── Frontend (Jest + jest-expo) ─────────────────────────────────────────────
frontend:test:
  stage: test
  image: node:20-bookworm
  timeout: 20m
  cache:
    key:
      files:
        - AccessCity.App/package-lock.json
    paths:
      - AccessCity.App/node_modules/
  script:
    - cd AccessCity.App
    - npm ci
    - npm run test:ci
  rules:
    - exists:
        - AccessCity.App/package.json

# ─── E2E (Playwright web; browsers match @playwright/test in package-lock) ───
e2e:playwright:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  timeout: 45m
  variables:
    CI: "true"
  cache:
    key:
      files:
        - AccessCity.App/package-lock.json
    paths:
      - AccessCity.App/node_modules/
  script:
    - cd AccessCity.App
    - npm ci
    - npx playwright test
  rules:
    - exists:
        - AccessCity.App/package.json
