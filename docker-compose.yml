      Routing__RouteGraphProfileMaxArtifactUnpackMilliseconds: ${Routing__RouteGraphProfileMaxArtifactUnpackMilliseconds:-150}
      Routing__RouteGraphProfileMaxShardReferencesPerRoute: ${Routing__RouteGraphProfileMaxShardReferencesPerRoute:-64}
