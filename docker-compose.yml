      Kafka__TopicAdminTimeoutSeconds: ${Kafka__TopicAdminTimeoutSeconds:-3}
      Kafka__TopicWarmupTimeoutSeconds: ${Kafka__TopicWarmupTimeoutSeconds:-10}
      Postgres__AutoMigrate: ${Worker_Postgres__AutoMigrate:-false}
      Postgres__AutoSchemaMaintenance: ${Worker_Postgres__AutoSchemaMaintenance:-false}
      Postgres__MigrateAndExit: "false"
      Postgres__UseStartupSessionParameters: ${Postgres__UseStartupSessionParameters:-false}
      Postgres__StatementTimeoutMs: ${Postgres__StatementTimeoutMs:-15000}
      Postgres__IdleInTransactionSessionTimeoutMs: ${Postgres__IdleInTransactionSessionTimeoutMs:-30000}
      Postgres__MaxPoolSize: ${Postgres__MaxPoolSize:-100}
