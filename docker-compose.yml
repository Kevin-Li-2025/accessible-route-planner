services:
  # ── ASP.NET Core API ──────────────────────────────────────────
  api:
    build:
      context: ./AccessCity.API
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Key: ${JWT_SECRET:-AccessCity_Secret_Key_For_Dev_2026_Placeholder}
      Jwt__Issuer: AccessCity.API
      Jwt__Audience: AccessCity.App
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 4g
    volumes:
      - ./AccessCity.API/london.osm:/app/london.osm:ro
      - ./AccessCity.API/birmingham.osm:/app/birmingham.osm:ro

  db:
    image: postgis/postgis:16-3.4
    container_name: accesscity_dev_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: accesscity
      POSTGRES_PASSWORD: accesscity123
      POSTGRES_DB: accesscitydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d accesscitydb -U accesscity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
