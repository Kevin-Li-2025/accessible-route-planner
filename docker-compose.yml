services:
  # ── ASP.NET Core API ──────────────────────────────────────────
  api:
    build:
      context: ./AccessCity.API
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Key: ${JWT_SECRET:-AccessCity_Secret_Key_For_Dev_2026_Placeholder}
      Jwt__PreviousKeys: ${JWT_PREVIOUS_KEYS:-}
      Jwt__Issuer: AccessCity.API
      Jwt__Audience: AccessCity.App
      Messaging__UseKafka: ${MESSAGING_USE_KAFKA:-false}
      Kafka__BootstrapServers: kafka:9092
      Kafka__ConsumerGroupId: accesscity-workers
      Kafka__TopicPrefix: accesscity_
      Kafka__MaxProcessingAttempts: ${Kafka__MaxProcessingAttempts:-3}
      Kafka__RetryDelaySeconds: ${Kafka__RetryDelaySeconds:-5}
      Postgres__UseStartupSessionParameters: ${Postgres__UseStartupSessionParameters:-false}
      Postgres__StatementTimeoutMs: ${Postgres__StatementTimeoutMs:-15000}
      Postgres__IdleInTransactionSessionTimeoutMs: ${Postgres__IdleInTransactionSessionTimeoutMs:-30000}
      Postgres__MaxPoolSize: ${Postgres__MaxPoolSize:-100}
      RateLimiting__Global__PermitLimit: ${RateLimiting__Global__PermitLimit:-100}
      RateLimiting__Global__QueueLimit: ${RateLimiting__Global__QueueLimit:-10}
      Workers__OsmImport__Enabled: ${API_OSM_WORKER_ENABLED:-true}
      Workers__TileWarming__Enabled: ${API_TILE_WORKER_ENABLED:-true}
      # Default false (avoids OOM on large extracts). Override when starting compose, e.g.:
      #   OsmImport__ImportOnStartup=true docker compose up -d --force-recreate api
      OsmImport__ImportOnStartup: ${OsmImport__ImportOnStartup:-false}
      # HybridCache L2 (route cache, etc.). Empty = use in-process memory only (see DependencyInjection).
      # Enable Redis: put `REDIS_CONNECTION=redis:6379` in a `.env` next to this file, then recreate api.
      ConnectionStrings__Redis: ${REDIS_CONNECTION:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 4g
    volumes:
      - ./AccessCity.API/london.osm:/app/london.osm:ro
      - ./AccessCity.API/birmingham.osm:/app/birmingham.osm:ro

  worker:
    profiles: ["worker"]
    build:
      context: ./AccessCity.API
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Key: ${JWT_SECRET:-AccessCity_Secret_Key_For_Dev_2026_Placeholder}
      Jwt__PreviousKeys: ${JWT_PREVIOUS_KEYS:-}
      Jwt__Issuer: AccessCity.API
      Jwt__Audience: AccessCity.App
      Messaging__UseKafka: ${MESSAGING_USE_KAFKA:-true}
      Kafka__BootstrapServers: kafka:9092
      Kafka__ConsumerGroupId: accesscity-workers
      Kafka__TopicPrefix: accesscity_
      Kafka__MaxProcessingAttempts: ${Kafka__MaxProcessingAttempts:-3}
      Kafka__RetryDelaySeconds: ${Kafka__RetryDelaySeconds:-5}
      Postgres__UseStartupSessionParameters: ${Postgres__UseStartupSessionParameters:-false}
      Postgres__StatementTimeoutMs: ${Postgres__StatementTimeoutMs:-15000}
      Postgres__IdleInTransactionSessionTimeoutMs: ${Postgres__IdleInTransactionSessionTimeoutMs:-30000}
      Postgres__MaxPoolSize: ${Postgres__MaxPoolSize:-100}
      OsmImport__ImportOnStartup: "false"
      ConnectionStrings__Redis: ${REDIS_CONNECTION:-redis:6379}
      Workers__OsmImport__Enabled: "true"
      Workers__TileWarming__Enabled: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    mem_limit: 4g
    volumes:
      - ./AccessCity.API/london.osm:/app/london.osm:ro
      - ./AccessCity.API/birmingham.osm:/app/birmingham.osm:ro

  db:
    image: postgis/postgis:16-3.4
    container_name: accesscity_dev_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: accesscity
      POSTGRES_PASSWORD: accesscity123
      POSTGRES_DB: accesscitydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d accesscitydb -U accesscity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: accesscity_dev_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    profiles: ["worker", "kafka"]
    image: bitnami/kafka:3.7
    container_name: accesscity_dev_kafka
    ports:
      - "9092:9092"
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

volumes:
  postgres_data:
