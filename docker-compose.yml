  migrate:
    profiles: ["migrate"]
    build:
      context: ./AccessCity.API
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Key: ${JWT_SECRET:-AccessCity_Secret_Key_For_Dev_2026_Placeholder}
      Jwt__Issuer: AccessCity.API
      Jwt__Audience: AccessCity.App
      Messaging__UseKafka: "false"
      Postgres__AutoMigrate: "true"
      Postgres__AutoSchemaMaintenance: "true"
      Postgres__MigrateAndExit: "true"
      Postgres__UseStartupSessionParameters: ${Postgres__UseStartupSessionParameters:-false}
      Postgres__StatementTimeoutMs: ${Postgres__StatementTimeoutMs:-60000}
      Postgres__IdleInTransactionSessionTimeoutMs: ${Postgres__IdleInTransactionSessionTimeoutMs:-60000}
      Postgres__MaxPoolSize: "5"
      Postgres__DbContextPoolSize: "16"
      OsmImport__ImportOnStartup: "false"
      Workers__OsmImport__Enabled: "false"
      Workers__Routing__Enabled: "false"
      Workers__TileWarming__Enabled: "false"
      ConnectionStrings__Redis: ${REDIS_CONNECTION:-redis:6379}
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 2g

  db:
    image: postgis/postgis:16-3.4
    container_name: accesscity_dev_db
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: accesscity
      POSTGRES_PASSWORD: accesscity123
      POSTGRES_DB: accesscitydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d accesscitydb -U accesscity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: accesscity_dev_redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:4.2.0
    container_name: accesscity_dev_kafka
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
