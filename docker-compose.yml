      Routing__MaxConcurrentComputations: ${Routing__MaxConcurrentComputations:-2}
      Routing__SyncSafePathTimeoutSeconds: ${Routing__SyncSafePathTimeoutSeconds:-4}
      Routing__JobComputationQueueTimeoutSeconds: ${Routing__JobComputationQueueTimeoutSeconds:-60}
      Routing__DispatchJobsToWorker: ${Routing__DispatchJobsToWorker:-true}
      Routing__RouteJobDispatchConcurrency: ${Routing__RouteJobDispatchConcurrency:-2}
      Routing__RouteGraphWarmupEnabled: ${Routing__RouteGraphWarmupEnabled:-true}
      Routing__RouteGraphWarmupDelaySeconds: ${Routing__RouteGraphWarmupDelaySeconds:-10}
      Routing__RouteGraphWarmupIntervalSeconds: ${Routing__RouteGraphWarmupIntervalSeconds:-240}
      Routing__RouteGraphWarmupRoutes__0__Name: ${Routing__RouteGraphWarmupRoutes__0__Name:-birmingham-core}
      Routing__RouteGraphWarmupRoutes__0__StartLat: ${Routing__RouteGraphWarmupRoutes__0__StartLat:-52.4862}
