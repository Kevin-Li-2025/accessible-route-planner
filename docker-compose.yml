      RiskScoring__CacheRadiusBucketMetres: ${RiskScoring__CacheRadiusBucketMetres:-50}
      RiskScoring__CacheFillTimeoutSeconds: ${RiskScoring__CacheFillTimeoutSeconds:-5}
      RiskScoring__ExternalSignalBudgetMilliseconds: ${RiskScoring__ExternalSignalBudgetMilliseconds:-350}
      RiskScoring__RealtimeExternalSignalsEnabled: ${RiskScoring__RealtimeExternalSignalsEnabled:-false}
      HotPathWarmup__Enabled: ${HotPathWarmup__Enabled:-true}
      HotPathWarmup__InitialDelaySeconds: ${HotPathWarmup__InitialDelaySeconds:-2}
