      Routing__RouteGraphProfileOutputPath: ${Routing__RouteGraphProfileOutputPath:-}
      Routing__RouteGraphProfileFailOnQualityGate: ${Routing__RouteGraphProfileFailOnQualityGate:-false}
      Routing__RouteGraphProfileMaxRedisPayloadBytes: ${Routing__RouteGraphProfileMaxRedisPayloadBytes:-8388608}
      Routing__RouteGraphProfileMaxArtifactBytes: ${Routing__RouteGraphProfileMaxArtifactBytes:-33554432}
      Routing__RouteGraphProfileMaxColdLoadMilliseconds: ${Routing__RouteGraphProfileMaxColdLoadMilliseconds:-2000}
      Routing__RouteGraphProfileMaxHotLoadMilliseconds: ${Routing__RouteGraphProfileMaxHotLoadMilliseconds:-100}
      Routing__RouteGraphProfileMaxArtifactPackMilliseconds: ${Routing__RouteGraphProfileMaxArtifactPackMilliseconds:-750}
