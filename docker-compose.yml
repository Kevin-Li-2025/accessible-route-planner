services:
  # ── ASP.NET Core API ──────────────────────────────────────────
  api:
    build:
      context: ./AccessCity.API
      dockerfile: Dockerfile
    expose:
      - "8080"
    volumes:
      - ./AccessCity.Tests/Fixtures:/app/osm:ro
      - ./data/osm:/app/osm-import:ro
      - ./data/route-graph-artifacts:/app/route-graph-artifacts
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Key: ${JWT_SECRET:-AccessCity_Secret_Key_For_Dev_2026_Placeholder}
      Jwt__PreviousKeys: ${JWT_PREVIOUS_KEYS:-}
      Jwt__Issuer: AccessCity.API
      Jwt__Audience: AccessCity.App
      Messaging__UseKafka: ${MESSAGING_USE_KAFKA:-true}
      Kafka__BootstrapServers: kafka:9092
      Kafka__ConsumerGroupId: accesscity-workers
      Kafka__TopicPrefix: accesscity_
      Kafka__MaxProcessingAttempts: ${Kafka__MaxProcessingAttempts:-3}
      Kafka__RetryDelaySeconds: ${Kafka__RetryDelaySeconds:-5}
      Kafka__TopicPartitions: ${Kafka__TopicPartitions:-3}
      Kafka__TopicReplicationFactor: ${Kafka__TopicReplicationFactor:-1}
      Kafka__TopicAdminTimeoutSeconds: ${Kafka__TopicAdminTimeoutSeconds:-3}
      Kafka__TopicWarmupTimeoutSeconds: ${Kafka__TopicWarmupTimeoutSeconds:-10}
      Postgres__AutoMigrate: ${Postgres__AutoMigrate:-true}
      Postgres__AutoSchemaMaintenance: ${Postgres__AutoSchemaMaintenance:-true}
      Postgres__MigrateAndExit: "false"
      Postgres__UseStartupSessionParameters: ${Postgres__UseStartupSessionParameters:-false}
      Postgres__StatementTimeoutMs: ${Postgres__StatementTimeoutMs:-15000}
      Postgres__IdleInTransactionSessionTimeoutMs: ${Postgres__IdleInTransactionSessionTimeoutMs:-30000}
      Postgres__MaxPoolSize: ${Postgres__MaxPoolSize:-100}
      Postgres__DbContextPoolSize: ${Postgres__DbContextPoolSize:-128}
      Routing__MaxConcurrentComputations: ${Routing__MaxConcurrentComputations:-4}
      Routing__SyncSafePathTimeoutSeconds: ${Routing__SyncSafePathTimeoutSeconds:-4}
      Routing__ComputationQueueTimeoutSeconds: ${Routing__ComputationQueueTimeoutSeconds:-2}
      Routing__JobComputationQueueTimeoutSeconds: ${Routing__JobComputationQueueTimeoutSeconds:-30}
      Routing__HazardQueryPaddingMetres: ${Routing__HazardQueryPaddingMetres:-250}
      Routing__MaxHazardsPerRequest: ${Routing__MaxHazardsPerRequest:-500}
      Routing__MaxRiskQueryRadiusMetres: ${Routing__MaxRiskQueryRadiusMetres:-2500}
      Routing__MaxRouteGraphEdges: ${Routing__MaxRouteGraphEdges:-20000}
      Routing__AsyncFirstForCacheMiss: ${Routing__AsyncFirstForCacheMiss:-true}
      Routing__AsyncFirstCacheProbeMilliseconds: ${Routing__AsyncFirstCacheProbeMilliseconds:-0}
      Routing__DispatchJobsToWorker: ${Routing__DispatchJobsToWorker:-true}
      Routing__RouteJobDispatchConcurrency: ${Routing__RouteJobDispatchConcurrency:-4}
      Routing__RouteGraphWarmupEnabled: ${Routing__RouteGraphWarmupEnabled:-false}
      Routing__RequireRouteGraphForReadiness: ${Routing__RequireRouteGraphForReadiness:-false}
      Routing__RouteGraphCacheTtlSeconds: ${Routing__RouteGraphCacheTtlSeconds:-300}
      Routing__RouteGraphShardSizeDegrees: ${Routing__RouteGraphShardSizeDegrees:-0.01}
      Routing__RouteGraphPrepartitionedShardsEnabled: ${Routing__RouteGraphPrepartitionedShardsEnabled:-true}
      Routing__RouteGraphMaxPrepartitionedShardCount: ${Routing__RouteGraphMaxPrepartitionedShardCount:-64}
      Routing__RouteGraphMinEdgesPerPrepartitionedShard: ${Routing__RouteGraphMinEdgesPerPrepartitionedShard:-250}
      Routing__RouteGraphPackedArtifactsEnabled: ${Routing__RouteGraphPackedArtifactsEnabled:-true}
      Routing__RouteGraphMaxDistributedSnapshotBytes: ${Routing__RouteGraphMaxDistributedSnapshotBytes:-8388608}
      Routing__RouteGraphFileArtifactStoreEnabled: ${Routing__RouteGraphFileArtifactStoreEnabled:-false}
      Routing__RouteGraphFileArtifactDirectory: ${Routing__RouteGraphFileArtifactDirectory:-/app/route-graph-artifacts}
      Routing__RouteGraphFileArtifactWriteThroughEnabled: ${Routing__RouteGraphFileArtifactWriteThroughEnabled:-true}
      Routing__RouteGraphFileArtifactManifestEnabled: ${Routing__RouteGraphFileArtifactManifestEnabled:-true}
      Routing__RouteGraphFileArtifactManifestFileName: ${Routing__RouteGraphFileArtifactManifestFileName:-manifest.json}
      Routing__RouteGraphMaxFileArtifactShardLoadCount: ${Routing__RouteGraphMaxFileArtifactShardLoadCount:-64}
      Routing__RouteGraphFileArtifactWarmupEnabled: ${Routing__RouteGraphFileArtifactWarmupEnabled:-false}
      Routing__RouteGraphFileArtifactWarmupDelaySeconds: ${Routing__RouteGraphFileArtifactWarmupDelaySeconds:-5}
      Routing__RouteGraphFileArtifactWarmupShardLimit: ${Routing__RouteGraphFileArtifactWarmupShardLimit:-64}
      Routing__RouteGraphFileArtifactWarmupLargestShardsFirst: ${Routing__RouteGraphFileArtifactWarmupLargestShardsFirst:-true}
      Routing__RouteGraphFileArtifactReadinessValidationShardLimit: ${Routing__RouteGraphFileArtifactReadinessValidationShardLimit:-8}
      Routing__RouteGraphOfflineShardArtifactBuildEnabled: ${Routing__RouteGraphOfflineShardArtifactBuildEnabled:-false}
      Routing__RouteGraphOfflineShardArtifactBuildLimit: ${Routing__RouteGraphOfflineShardArtifactBuildLimit:-0}
      Routing__RouteGraphAltPreprocessingEnabled: ${Routing__RouteGraphAltPreprocessingEnabled:-true}
      Routing__RouteGraphAltLandmarkCount: ${Routing__RouteGraphAltLandmarkCount:-4}
      Routing__RouteGraphMaxAltPreprocessedNodes: ${Routing__RouteGraphMaxAltPreprocessedNodes:-25000}
      Routing__RouteGraphContractionHierarchyEnabled: ${Routing__RouteGraphContractionHierarchyEnabled:-false}
      Routing__RouteGraphMaxContractionHierarchyNodes: ${Routing__RouteGraphMaxContractionHierarchyNodes:-25000}
      Routing__RouteGraphReleaseBuildAndExit: ${Routing__RouteGraphReleaseBuildAndExit:-false}
      Routing__RouteGraphReleaseValidateAndExit: ${Routing__RouteGraphReleaseValidateAndExit:-false}
      Routing__RouteGraphReleasePaddingDegrees: ${Routing__RouteGraphReleasePaddingDegrees:-0.01}
      Routing__RouteGraphReleaseShardSizeDegrees: ${Routing__RouteGraphReleaseShardSizeDegrees:-0}
      Routing__RouteGraphReleaseSourceName: ${Routing__RouteGraphReleaseSourceName:-release-pipeline}
      Routing__RouteGraphProfileAndExit: ${Routing__RouteGraphProfileAndExit:-false}
