      HotPathWarmup__TimeoutSeconds: ${HotPathWarmup__TimeoutSeconds:-20}
      HotPathWarmup__MaxPoints: ${HotPathWarmup__MaxPoints:-192}
      HotPathWarmup__BucketCorridorRadiusSteps: ${HotPathWarmup__BucketCorridorRadiusSteps:-20}
      HotPathWarmup__BucketCorridorStepDegrees: ${HotPathWarmup__BucketCorridorStepDegrees:-0.0001}
      HotPathWarmup__RiskRadiusMetres: ${HotPathWarmup__RiskRadiusMetres:-500}
      HotPathWarmup__PoiRadiusMetres: ${HotPathWarmup__PoiRadiusMetres:-750}
      HotPathWarmup__WarmRouteGraph: ${HotPathWarmup__WarmRouteGraph:-false}
      HotPathWarmup__Points__0__Name: ${HotPathWarmup__Points__0__Name:-birmingham-core}
      HotPathWarmup__Points__0__Lat: ${HotPathWarmup__Points__0__Lat:-52.4862}
      HotPathWarmup__Points__0__Lng: ${HotPathWarmup__Points__0__Lng:--1.8904}
      HotPathWarmup__Points__1__Name: ${HotPathWarmup__Points__1__Name:-birmingham-east}
      HotPathWarmup__Points__1__Lat: ${HotPathWarmup__Points__1__Lat:-52.4835}
      HotPathWarmup__Points__1__Lng: ${HotPathWarmup__Points__1__Lng:--1.8885}
      ExternalApis__CircuitBreaker__FailureThreshold: ${ExternalApis__CircuitBreaker__FailureThreshold:-3}
      ExternalApis__CircuitBreaker__BreakSeconds: ${ExternalApis__CircuitBreaker__BreakSeconds:-30}
      ExternalApis__CircuitBreaker__QueueTimeoutMilliseconds: ${ExternalApis__CircuitBreaker__QueueTimeoutMilliseconds:-50}
      ExternalApis__Osrm__TimeoutSeconds: ${ExternalApis__Osrm__TimeoutSeconds:-3}
      ExternalApis__Osrm__MaxConcurrentRequests: ${ExternalApis__Osrm__MaxConcurrentRequests:-32}
      ExternalApis__Overpass__TimeoutSeconds: ${ExternalApis__Overpass__TimeoutSeconds:-5}
      ExternalApis__Overpass__MaxConcurrentRequests: ${ExternalApis__Overpass__MaxConcurrentRequests:-4}
      ExternalApis__UkPolice__TimeoutSeconds: ${ExternalApis__UkPolice__TimeoutSeconds:-2}
      ExternalApis__UkPolice__MaxConcurrentRequests: ${ExternalApis__UkPolice__MaxConcurrentRequests:-8}
      ExternalApis__Environmental__TimeoutSeconds: ${ExternalApis__Environmental__TimeoutSeconds:-3}
      ExternalApis__Environmental__MaxConcurrentRequests: ${ExternalApis__Environmental__MaxConcurrentRequests:-4}
      RateLimiting__Global__PermitLimit: ${RateLimiting__Global__PermitLimit:-30000}
      RateLimiting__Global__QueueLimit: ${RateLimiting__Global__QueueLimit:-0}
      Workers__OsmImport__Enabled: ${API_OSM_WORKER_ENABLED:-true}
      Workers__Routing__Enabled: ${API_ROUTING_WORKER_ENABLED:-false}
      Workers__TileWarming__Enabled: ${API_TILE_WORKER_ENABLED:-true}
      # Local compose mounts the small fixture below; production should override FilePath with a city extract.
      OsmImport__FilePath: ${OsmImport__FilePath:-/app/osm/test-network.osm}
      OsmImport__ImportOnStartup: ${OsmImport__ImportOnStartup:-true}
      OsmImport__UsePostgresCopy: ${OsmImport__UsePostgresCopy:-true}
      OsmImport__BulkCopyBatchSize: ${OsmImport__BulkCopyBatchSize:-20000}
      # HybridCache L2 (route cache, etc.). Empty = use in-process memory only (see DependencyInjection).
      # Enable Redis: put `REDIS_CONNECTION=redis:6379` in a `.env` next to this file, then recreate api.
      ConnectionStrings__Redis: ${REDIS_CONNECTION:-redis:6379}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    mem_limit: 4g
  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "${ACCESSCITY_API_HOST_PORT:-8080}:8080"
    volumes:
      - ./deploy/nginx/accesscity-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  worker:
    profiles: ["worker"]
    build:
      context: ./AccessCity.API
      dockerfile: Dockerfile
    volumes:
