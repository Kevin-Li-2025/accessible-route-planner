      Routing__RouteGraphFileArtifactStoreEnabled: ${Routing__RouteGraphFileArtifactStoreEnabled:-false}
      Routing__RouteGraphFileArtifactDirectory: ${Routing__RouteGraphFileArtifactDirectory:-/app/route-graph-artifacts}
      Routing__RouteGraphFileArtifactWriteThroughEnabled: ${Routing__RouteGraphFileArtifactWriteThroughEnabled:-true}
      Routing__RouteGraphFileArtifactManifestEnabled: ${Routing__RouteGraphFileArtifactManifestEnabled:-true}
      Routing__RouteGraphFileArtifactManifestFileName: ${Routing__RouteGraphFileArtifactManifestFileName:-manifest.json}
      Routing__RouteGraphMaxFileArtifactShardLoadCount: ${Routing__RouteGraphMaxFileArtifactShardLoadCount:-64}
      Routing__RouteGraphFileArtifactWarmupEnabled: ${Routing__RouteGraphFileArtifactWarmupEnabled:-true}
