      Routing__RouteGraphDistributedLoadLockTtlSeconds: ${Routing__RouteGraphDistributedLoadLockTtlSeconds:-8}
      Routing__RouteGraphDistributedLoadWaitMilliseconds: ${Routing__RouteGraphDistributedLoadWaitMilliseconds:-3500}
      Routing__DistributedCoalescingEnabled: ${Routing__DistributedCoalescingEnabled:-true}
      Routing__DistributedCoalescingLockTtlSeconds: ${Routing__DistributedCoalescingLockTtlSeconds:-6}
      Routing__DistributedCoalescingResultTtlSeconds: ${Routing__DistributedCoalescingResultTtlSeconds:-10}
